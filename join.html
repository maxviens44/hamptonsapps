 <!DOCTYPE html>                                                                                                                                                                                                 
  <html lang="en">
  <head>                                                                                                                                                                                                          
    <meta charset="UTF-8">                                  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Property – Turnover</title>                                                                                                                                                                       
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }                                                                                                                                                        
      body {                                                                                                                                                                                                      
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: #2C4A5A;                                                                                                                                                                                      
        min-height: 100vh;                                                                                                                                                                                        
        display: flex;
        align-items: center;                                                                                                                                                                                      
        justify-content: center;                            
        padding: 24px;                                                                                                                                                                                            
      }
      .card {                                                                                                                                                                                                     
        background: white;                                  
        border-radius: 20px;
        padding: 40px 32px;
        max-width: 380px;                                                                                                                                                                                         
        width: 100%;
        text-align: center;                                                                                                                                                                                       
      }                                                     
      .icon { font-size: 48px; margin-bottom: 16px; }
      h1 { font-size: 22px; color: #2C4A5A; margin-bottom: 8px; }                                                                                                                                                 
      p { color: #666; font-size: 15px; line-height: 1.5; margin-bottom: 24px; }
      .code-box {                                                                                                                                                                                                 
        background: #f0f4f6;                                
        border-radius: 12px;                                                                                                                                                                                      
        padding: 16px;                                      
        margin-bottom: 28px;                                                                                                                                                                                      
      }                                                     
      .code-label { font-size: 12px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }                                                                                           
      .code { font-size: 36px; font-weight: 700; color: #2C4A5A; font-family: monospace; letter-spacing: 2px; }
      .btn {                                                                                                                                                                                                      
        display: inline-block;                              
        background: #2C4A5A;                                                                                                                                                                                      
        color: white;                                                                                                                                                                                             
        text-decoration: none;
        padding: 14px 28px;                                                                                                                                                                                       
        border-radius: 12px;                                
        font-size: 16px;
        font-weight: 600;                                                                                                                                                                                         
        width: 100%;
        margin-bottom: 12px;                                                                                                                                                                                      
      }                                                     
      .btn-outline {
        display: inline-block;                                                                                                                                                                                    
        background: transparent;
        color: #2C4A5A;                                                                                                                                                                                           
        text-decoration: none;                              
        padding: 13px 28px;
        border-radius: 12px;                                                                                                                                                                                      
        font-size: 15px;
        font-weight: 600;                                                                                                                                                                                         
        width: 100%;                                        
        border: 2px solid #2C4A5A;
        margin-bottom: 24px;
      }                                                                                                                                                                                                           
      .divider { font-size: 13px; color: #aaa; margin-bottom: 16px; }
      .steps { text-align: left; }                                                                                                                                                                                
      .step { display: flex; gap: 12px; margin-bottom: 12px; font-size: 14px; color: #555; }
      .step-num {                                                                                                                                                                                                 
        background: #2C4A5A;                                
        color: white;                                                                                                                                                                                             
        border-radius: 50%;                                 
        width: 22px;                                                                                                                                                                                              
        height: 22px;                                       
        min-width: 22px;
        display: flex;                                                                                                                                                                                            
        align-items: center;
        justify-content: center;                                                                                                                                                                                  
        font-size: 12px;                                    
        font-weight: 700;
      }
    </style>
  </head>                                                                                                                                                                                                         
  <body>
    <div class="card">                                                                                                                                                                                            
      <div class="icon">🏡</div>                            
      <h1>You've been invited!</h1>
      <p>Tap below to open Turnover and join this property.</p>                                                                                                                                                   
      <div class="code-box">
        <div class="code-label">Your Invite Code</div>                                                                                                                                                            
        <div class="code" id="code">—</div>                                                                                                                                                                       
      </div>
      <a class="btn" id="open-app" href="#">Open in Turnover</a>                                                                                                                                                  
      <div class="divider">Don't have the app yet?</div>                                                                                                                                                          
      <a class="btn-outline" href="https://apps.apple.com/app/id6761634784">Download Turnover</a>
      <div class="steps">                                                                                                                                                                                         
        <div class="step"><span class="step-num">1</span><span>Download and open the Turnover app</span></div>
        <div class="step"><span class="step-num">2</span><span>Tap <strong>Join with Team Code</strong> on the sign-in screen</span></div>                                                                        
        <div class="step"><span class="step-num">3</span><span>Enter the invite code above</span></div>                                                                                                           
      </div>                                                                                                                                                                                                      
    </div>                                                                                                                                                                                                        
    <script>                                                                                                                                                                                                      
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      if (code) {                                                                                                                                                                                                 
        const upper = code.toUpperCase();
        document.getElementById('code').textContent = upper;                                                                                                                                                      
        document.getElementById('open-app').href = 'turnover://join?code=' + upper;
      } else {                                                                                                                                                                                                    
        document.getElementById('open-app').style.display = 'none';
      }                                                                                                                                                                                                           
    </script>                                               
  </body>
  </html>
